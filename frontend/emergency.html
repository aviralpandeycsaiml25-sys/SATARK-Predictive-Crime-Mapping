<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SATARK - Emergency Dispatch</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- Leaflet Routing Machine -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow: hidden; height: 100vh;}
    .bg-main { position: fixed; inset: 0; opacity: 0.15; z-index: -1; background: url('/frontend/assets/dashboard_bg.png') center/cover no-repeat; filter: grayscale(50%); }
    .glass { background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; }
    
    #map { width: 100%; height: 100%; border-radius: 12px; }
    
    .list-item { transition: all 0.2s; border-left: 3px solid transparent; }
    .list-item:hover, .list-item.active { background: rgba(255,255,255,0.05); border-left-color: #ef4444; } /* Red for emergency */

    /* Override OSRM Routing Control Box to make it dark */
    .leaflet-routing-container {
      background-color: rgba(10, 10, 15, 0.85) !important;
      backdrop-filter: blur(10px);
      color: #fff !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      border-radius: 8px !important;
    }
    .leaflet-routing-alt h2 { color: #fff !important; }
    .leaflet-routing-alt h3 { color: #f87171 !important; }
    .leaflet-routing-alt tr:hover { background-color: rgba(255,255,255,0.1) !important; }
  </style>
</head>
<body class="flex flex-col h-screen text-gray-100 p-4 gap-4">
  <div class="bg-main"></div>

  <!-- Header -->
  <div class="flex items-center justify-between glass px-6 py-4 shrink-0 shadow-lg">
    <div class="flex items-center gap-4">
      <a href="/" class="p-2 bg-white/5 hover:bg-white/10 rounded-lg transition">
        <svg class="h-5 w-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
      </a>
      <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(239,68,68,0.5)]">
        <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
      </div>
      <div>
        <h1 class="text-xl font-bold tracking-tight text-white">EMERGENCY DISPATCH</h1>
        <p class="text-xs text-red-400 font-bold uppercase tracking-wider">Active Routing protocol</p>
      </div>
    </div>
  </div>

  <!-- Main Content Layout -->
  <div class="flex flex-1 gap-4 overflow-hidden">
    
    <!-- Left Sidebar: Active Emergencies -->
    <div class="w-80 glass flex flex-col shrink-0 shadow-xl overflow-hidden">
      <div class="p-4 border-b border-white/5">
        <h2 class="text-sm font-bold text-gray-300 uppercase tracking-widest mb-3">Priority Queues</h2>
        <input type="text" class="w-full bg-black/50 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-500" placeholder="Filter Area Code...">
      </div>
      <div class="flex-1 overflow-y-auto" id="emergency-list">
        <!-- Injected via JS -->
      </div>
    </div>

    <!-- Right Side: The Map -->
    <div class="flex-1 glass p-2 relative shadow-2xl">
      <div id="map"></div>
      <!-- Overlay text if no route selected -->
      <div id="map-overlay" class="absolute inset-0 z-[500] flex items-center justify-center bg-black/40 backdrop-blur-sm pointer-events-none transition opacity-100">
         <div class="bg-black/60 px-6 py-4 rounded-xl border border-white/10 text-center">
            <h3 class="text-lg font-bold text-gray-200">AWAITING DISPATCH ORDER</h3>
            <p class="text-sm text-gray-400">Select an emergency from the queue to trace route.</p>
         </div>
      </div>
    </div>
    
  </div>

  <script>
    const emergencies = [
      { id: 1, type: 'Armed Robbery', location: 'Hazratganj, Lucknow', lat: 26.8467, lon: 80.9462, police_lat: 26.8500, police_lon: 80.9400, time: '2m ago' },
      { id: 2, type: 'Suspect Fleeing', location: 'Gomti Nagar, Lucknow', lat: 26.8601, lon: 80.9922, police_lat: 26.8700, police_lon: 81.0000, time: '5m ago' },
      { id: 3, type: 'Hostage Situation', location: 'Connaught Place, Delhi', lat: 28.6304, lon: 77.2177, police_lat: 28.6250, police_lon: 77.2100, time: '12m ago' },
      { id: 4, type: 'Assault', location: 'Andheri West, Mumbai', lat: 19.1136, lon: 72.8697, police_lat: 19.1200, police_lon: 72.8500, time: '15m ago' }
    ];

    let map = L.map('map', { zoomControl: false }).setView([22.0, 79.0], 5);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

    let routingControl = null;

    // Render list
    const listEl = document.getElementById('emergency-list');
    emergencies.forEach(e => {
      const item = document.createElement('div');
      item.className = 'p-4 list-item cursor-pointer border-b border-white/5 flex flex-col gap-1';
      item.onclick = () => selectEmergency(e.id, item);
      item.innerHTML = `
        <div class="flex justify-between items-center">
          <span class="text-sm font-bold text-red-500">${e.type}</span>
          <span class="text-[10px] text-red-400/70 font-mono animate-pulse">LIVE</span>
        </div>
        <div class="text-xs text-gray-300 font-medium">${e.location}</div>
        <div class="flex justify-between items-center mt-2">
          <span class="text-[10px] text-gray-500 font-mono">T-minus: ${e.time}</span>
          <span class="text-[10px] bg-red-500/20 text-red-400 px-2 py-0.5 rounded uppercase">Dispatch</span>
        </div>
      `;
      listEl.appendChild(item);
    });

    function selectEmergency(id, element) {
      document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
      element.classList.add('active');

      const data = emergencies.find(x => x.id === id);
      
      // Hide await overlay
      document.getElementById('map-overlay').style.opacity = '0';

      // Clear existing route
      if(routingControl) {
        map.removeControl(routingControl);
      }

      // Fly to roughly area first
      map.flyTo([data.lat, data.lon], 13, { duration: 1 });

      setTimeout(() => {
         // Create police icon
         const policeIcon = L.icon({
           iconUrl: 'https://cdn-icons-png.flaticon.com/512/8614/8614138.png',
           iconSize: [32, 32],
         });

         // Create Route using OSRM
         routingControl = L.Routing.control({
           waypoints: [
             L.latLng(data.police_lat, data.police_lon), // Police Station/Van starting point
             L.latLng(data.lat, data.lon) // Emergency Location Target
           ],
           routeWhileDragging: false,
           addWaypoints: false,
           lineOptions: {
              styles: [{color: '#3b82f6', opacity: 0.8, weight: 6}] // Blue police route
           },
           createMarker: function(i, wp, nWps) {
             // i == 0 is start, i == 1 is end
             if (i === 0) {
               return L.marker(wp.latLng, {icon: policeIcon}).bindPopup("Unit 90A (En Route)");
             } else {
               return L.marker(wp.latLng).bindPopup("CRITICAL INCIDENT ZONE");
             }
           }
         }).addTo(map);
      }, 1200); // execute after fly
    }

  </script>
</body>
</html>
