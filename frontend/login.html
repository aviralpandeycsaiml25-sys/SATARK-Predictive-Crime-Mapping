<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SATARK - Secure Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #000; overflow: hidden; margin: 0; }
    .bg-image { position: fixed; inset: 0; background: url('/frontend/assets/login_bg.png') center/cover; opacity: 0.5; z-index: 1; }
    .glass-panel {
      position: relative; z-index: 10;
      background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .input-field {
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); 
      color: white; transition: all 0.3s ease;
    }
    .input-field:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); }
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-apple { background: #fff; color: #000; border: 1px solid #e5e7eb; }
    .btn-google { background: #fff; color: #374151; border: 1px solid #e5e7eb; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">
  <div class="bg-image"></div>
  <div class="glass-panel p-10 w-full max-w-md mx-4 animate-fade-in-up">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-600 rounded-full mx-auto mb-4 flex items-center justify-center shadow-[0_0_20px_rgba(59,130,246,0.6)]">
         <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
      </div>
      <h1 class="text-3xl font-bold text-white tracking-tight mb-2">SATARK</h1>
      <p class="text-gray-400 text-sm font-medium">Secure Law Enforcement Portal</p>
    </div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Officer ID / Email</label>
        <input type="text" id="username" class="input-field w-full px-4 py-3 rounded-lg text-sm" placeholder="e.g. badge_1092" required>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Passcode</label>
        <input type="password" id="password" class="input-field w-full px-4 py-3 rounded-lg text-sm" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn-primary w-full py-3 rounded-lg text-white font-semibold text-sm mt-4 shadow-lg">Authenticate</button>
    </form>

    <div class="mt-6 flex items-center justify-between">
      <hr class="w-full border-gray-700"><span class="px-2 text-xs text-gray-500 uppercase font-bold">OR</span><hr class="w-full border-gray-700">
    </div>

    <div class="mt-6 space-y-3">
      <button onclick="mockOAuth('Google')" class="btn-google w-full flex items-center justify-center py-2.5 rounded-lg font-medium text-sm hover:bg-gray-50 transition shadow-sm">
        <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign in with Google
      </button>
      <button onclick="mockOAuth('Apple')" class="btn-apple w-full flex items-center justify-center py-2.5 rounded-lg font-medium text-sm hover:bg-gray-50 transition shadow-sm">
        <svg class="w-5 h-5 mr-2" viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
        Sign in with Apple
      </button>
    </div>
  </div>

  <script>
    function performLogin(name, role) {
      localStorage.setItem('satark_token', 'mock_jwt_token_123');
      localStorage.setItem('officer_name', name);
      localStorage.setItem('officer_rank', role);
      window.location.href = '/';
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value;
      performLogin(user.toUpperCase(), 'COMMANDER');
    });

    function mockOAuth(provider) {
      performLogin(`Sgt. Davis (${provider})`, 'DETECTIVE');
    }
  </script>
</body>
</html>
